[changelog]
body = """
{% for group, commits in commits | group_by(attribute="group") %}
{{ group }}
{% for commit in commits %}
- {{ commit.message }}
{% endfor %}
{% endfor %}
"""

[git]
conventional_commits = true
commit_parsers = [
  { message = "^feat", group = "🚀 Новое" },
  { message = "^fix", group = "🛠 Исправления" },
  { message = "^chore|^refactor", skip = true },
  { message = ".*", skip = true },
]
